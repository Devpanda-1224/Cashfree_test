<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cashfree Production Checkout</title>

    <!-- Cashfree SDK -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }

      button {
        padding: 14px 24px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #111827;
        color: white;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <button id="payBtn">Pay Now</button>

    <script>
      const payBtn = document.getElementById("payBtn");

      async function pay() {
        try {
          payBtn.disabled = true;
          payBtn.innerText = "Processing...";

          // Initialize Cashfree SDK
          const cashfree = Cashfree({
            mode: "production",
          });

          // IMPORTANT:
          // paymentSessionId MUST come dynamically
          // from your backend production API

          const paymentSessionId =
            "session_CZ3DlGbCmLtYUgLwLk8ZYHE1qxiikVRRUC4LYqmlwzgnPcrsd2BM1FN5TtG2bLykR-XPW1d1ZEg0BKJuMKNfUtom-ZsSDQcaoieN-3Jhb7YxVUeJf-zAl9WDsV0l";

          const checkoutOptions = {
            paymentSessionId,

            // Better for WebView + UPI apps
            redirectTarget: "_top",

            // Optional but recommended
            appearance: {
              width: "100%",
              height: "700px",
            },
          };

          const result = await cashfree.checkout(checkoutOptions);

          console.log("Checkout initialized:", result);
        } catch (err) {
          console.error("Cashfree Checkout Error:", err);

          alert(err?.message || "Unable to start payment");
        } finally {
          payBtn.disabled = false;
          payBtn.innerText = "Pay Now";
        }
      }

      payBtn.addEventListener("click", pay);
    </script>
  </body>
</html>
